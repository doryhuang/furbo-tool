<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ 檢測機器輪值統計 (共用版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        .font-bold-name { font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F5F5F4] text-[#1C1917] min-h-screen">

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 設定處 ---
        // 請將下方的 YOUR_GAS_API_URL_HERE 替換為你的 Google Apps Script 部署 URL
        const API_URL = 'https://script.google.com/macros/s/AKfycby4gml1_zt3kO-UlMq5yiGt80VLok0sZQH98xDU8SjLCxxaXVDRoEA3Icm9NYa5HTDUcg/exec'; 

        const INITIAL_STAFF = [
            { id: 'tw-1', name: 'Dory', region: 'TW' },
            { id: 'tw-2', name: 'Cindy', region: 'TW' },
            { id: 'cn-1', name: 'Pizza', region: 'CN' },
            { id: 'cn-2', name: 'Mia', region: 'CN' },
            { id: 'cn-3', name: 'Cloriss', region: 'CN' },
        ];

        function App() {
            const [staff, setStaff] = useState(INITIAL_STAFF.map(s => ({...s, inOffice: true})));
            const [totalInput, setTotalInput] = useState('');
            const [history, setHistory] = useState([]);
            const [currentResult, setCurrentResult] = useState(null);
            const [showCalendar, setShowCalendar] = useState(false);
            const [loading, setLoading] = useState(true);
            const [syncing, setSyncing] = useState(false);
            const [monthlyStats, setMonthlyStats] = useState({});
            const [totalMonthlyUnits, setTotalMonthlyUnits] = useState(0);
            const [yearlyTable, setYearlyTable] = useState(Array(12).fill(0));

            // --- 雲端同步邏輯 ---

            const fetchData = async () => {
                try {
                    setLoading(true);
                    const resp = await fetch(`${API_URL}?action=getInitialData`);
                    const data = await resp.json();
                    
                    // 更新介面狀態
                    setHistory(data.records);
                    setStaff(prev => prev.map(s => ({
                        ...s, 
                        inOffice: data.staffStatus[s.id] !== undefined ? data.staffStatus[s.id] : true
                    })));
                    setTotalMonthlyUnits(data.monthlyTotal);
                    setYearlyTable(data.yearlyTable);

                    // 計算當月每人累計 (從 history 中計算)
                    const stats = {};
                    INITIAL_STAFF.forEach(s => stats[s.name] = 0);
                    data.records.forEach(rec => {
                        Object.entries(rec.allocations).forEach(([name, count]) => {
                            stats[name] = (stats[name] || 0) + count;
                        });
                    });
                    setMonthlyStats(stats);

                } catch (err) {
                    console.error("同步失敗:", err);
                    alert("同步雲端資料失敗，請檢查網路設定。");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
            }, []);

            const toggleStaffStatus = async (staffId) => {
                setSyncing(true);
                // 1. 先更新前端介面 (快速響應)
                setStaff(prev => prev.map(s => s.id === staffId ? {...s, inOffice: !s.inOffice} : s));
                // 2. 同步到雲端
                try {
                    await fetch(`${API_URL}?action=toggleStaff&staffId=${staffId}`);
                } catch (err) {
                    console.error("同步人員狀態失敗:", err);
                    // 失敗時回滾
                    setStaff(prev => prev.map(s => s.id === staffId ? {...s, inOffice: !s.inOffice} : s));
                } finally {
                    setSyncing(false);
                }
            };

            const saveAllocation = async () => {
                if (!currentResult) return;
                const newRec = {
                    id: Date.now(),
                    date: new Date().toISOString(),
                    totalUnits: parseInt(totalInput),
                    allocations: currentResult
                };
                
                setSyncing(true);
                try {
                    // 1. 同步到雲端
                    await fetch(`${API_URL}?action=saveAllocation`, {
                        method: 'POST',
                        body: JSON.stringify(newRec)
                    });
                    // 2. 成功後重新抓取資料 (確保資料一致)
                    await fetchData();
                    
                    // 3. 清空輸入
                    setTotalInput('');
                    setCurrentResult(null);
                } catch (err) {
                    console.error("儲存失敗:", err);
                    alert("儲存分配紀錄失敗，請檢查網路設定。");
                } finally {
                    setSyncing(false);
                }
            };

            // --- 核心分配演算法 (同共用版) ---
            const calculate = () => {
                const units = parseInt(totalInput) || 0;
                if (units <= 0) return alert("請輸入有效數量");

                const twIn = staff.filter(s => s.region === 'TW' && s.inOffice);
                const cnIn = staff.filter(s => s.region === 'CN' && s.inOffice);
                const totalIn = [...twIn, ...cnIn];

                if (totalIn.length === 0) return alert("請至少勾選一名到班人員");

                const res = {};
                INITIAL_STAFF.forEach(s => res[s.name] = 0);

                let remaining = units;

                // 優先分配邏輯：TW優先分配1台
                if (units >= twIn.length) {
                    twIn.forEach(s => { res[s.name] = 1; remaining--; });
                } else {
                    const sortedTW = [...twIn].sort((a,b) => (monthlyStats[a.name] || 0) - (monthlyStats[b.name] || 0));
                    for(let i=0; i<remaining; i++) res[sortedTW[i].name] = 1;
                    remaining = 0;
                }

                // 剩餘大量分配公式 (手冊規範)
                if (remaining > 0) {
                    const nTW = twIn.length;
                    const nCN = cnIn.length;

                    if (nTW > 0) {
                        const reserveForCN = Math.min(remaining, nCN);
                        let forTW = remaining - reserveForCN;
                        const extraPerTW = Math.floor(forTW / nTW);
                        twIn.forEach(s => { res[s.name] += extraPerTW; forTW -= extraPerTW; });
                        
                        let leftover = forTW + reserveForCN;
                        const sortedTotal = [...totalIn].sort((a,b) => {
                            const diff = (monthlyStats[a.name] || 0) - (monthlyStats[b.name] || 0);
                            return diff !== 0 ? diff : (a.region === 'TW' ? -1 : 1);
                        });
                        for(let i=0; i<leftover; i++) { res[sortedTotal[i % sortedTotal.length].name] += 1; }
                    } else {
                        const perCN = Math.floor(remaining / nCN);
                        cnIn.forEach(s => { res[s.name] += perCN; remaining -= perCN; });
                        const sortedCN = [...cnIn].sort((a,b) => (monthlyStats[a.name] || 0) - (monthlyStats[b.name] || 0));
                        for(let i=0; i<remaining; i++) res[sortedCN[i].name] += 1;
                    }
                }
                setCurrentResult(res);
            };

            // 初始化 Lucide 圖標
            useEffect(() => { lucide.createIcons(); }, [loading, syncing, showCalendar, currentResult]);

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center text-[#A8A29E]">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-black mb-4"></div>
                        <p className="text-sm">正在從雲端同步最新資料...</p>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-6 py-10 relative">
                    {syncing && (
                        <div className="fixed top-4 right-4 bg-black text-white px-4 py-2 rounded-full text-xs font-bold flex items-center gap-2 z-50 animate-pulse">
                            <i data-lucide="refresh-cw" class="w-3 h-3 animate-spin"></i>
                            雲端同步中...
                        </div>
                    )}
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-4">
                        <div>
                            <div className="flex items-center gap-2 text-[#A8A29E] text-[10px] tracking-[0.2em] uppercase font-mono mb-2">
                                <i data-lucide="camera" class="w-3 h-3"></i>
                                <span>Furbo Support Operations (Cloud)</span>
                            </div>
                            <h1 className="text-4xl font-bold tracking-tight">HQ 檢測機器輪值統計</h1>
                        </div>
                        <div onClick={() => setShowCalendar(true)} className="bg-white border border-[#E7E5E4] p-4 rounded-xl shadow-sm flex items-center gap-4 cursor-pointer hover:bg-gray-50 transition-all group relative">
                            <div className="text-right">
                                <p className="text-[10px] text-[#78716C] uppercase font-mono">當月分配結果</p>
                                <p className="text-2xl font-mono font-bold">{totalMonthlyUnits}</p>
                            </div>
                            <i data-lucide="calendar" class="text-[#A8A29E] group-hover:text-black transition-colors"></i>
                        </div>
                    </header>

                    <main className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                        <div className="lg:col-span-7 space-y-10">
                            <section>
                                <h2 className="text-[10px] font-mono uppercase tracking-widest text-[#78716C] mb-4 flex items-center gap-2">
                                    <i data-lucide="calculator" class="w-3 h-3"></i> 01. 當日數量
                                </h2>
                                <div className="bg-white p-8 rounded-2xl border border-[#E7E5E4] shadow-sm flex flex-col sm:flex-row gap-4">
                                    <div className="flex-1">
                                        <label className="block text-xs font-bold mb-2 text-[#78716C]">今日收到機器總數</label>
                                        <input type="number" value={totalInput} onChange={e => setTotalInput(e.target.value)} placeholder="輸入數量..." className="w-full bg-[#F5F5F4] border-none rounded-xl px-4 py-3 text-lg font-mono focus:ring-2 focus:ring-black outline-none" />
                                    </div>
                                    <button onClick={calculate} className="sm:self-end bg-[#1C1917] text-white px-8 py-3.5 rounded-xl font-bold hover:bg-black transition-all active:scale-95">計算分配</button>
                                </div>
                            </section>

                            <section>
                                <h2 className="text-[10px] font-mono uppercase tracking-widest text-[#78716C] mb-4 flex items-center gap-2">
                                    <i data-lucide="users" class="w-3 h-3"></i> 02. 到班人員
                                </h2>
                                {['TW', 'CN'].map(reg => (
                                    <div key={reg} className="bg-white rounded-2xl border border-[#E7E5E4] overflow-hidden mb-4 shadow-sm">
                                        <div className="bg-[#FAFAF9] px-6 py-2.5 border-b border-[#E7E5E4] flex justify-between text-[10px] font-bold text-[#A8A29E]">
                                            <span>{reg} 團隊</span>
                                            <span>{staff.filter(s=>s.region===reg && s.inOffice).length} / {staff.filter(s=>s.region===reg).length} 在公司</span>
                                        </div>
                                        {staff.filter(s=>s.region===reg).map(s => (
                                            <div key={s.id} onClick={() => toggleStaffStatus(s.id)} className="flex items-center justify-between px-6 py-4 cursor-pointer hover:bg-gray-50 border-b last:border-none border-[#F5F5F4] group">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-2 h-2 rounded-full ${s.inOffice ? 'bg-green-500' : 'bg-gray-300'}`}></div>
                                                    <span className={`${s.inOffice ? 'text-black font-medium' : 'text-[#A8A29E] line-through'} transition-all`}>{s.name}</span>
                                                </div>
                                                <div className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all ${s.inOffice?'bg-black border-black':'border-gray-200 bg-white'}`}>
                                                    {s.inOffice && <i data-lucide="check" class="w-3.5 h-3.5 text-white"></i>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </section>
                        </div>

                        <div className="lg:col-span-5 space-y-10">
                            <section>
                                <h2 className="text-[10px] font-mono uppercase tracking-widest text-[#78716C] mb-4 flex items-center gap-2">
                                    <i data-lucide="check-circle" class="w-3 h-3"></i> 03. 分配結果
                                </h2>
                                {currentResult ? (
                                    <div className="bg-[#1C1917] text-white p-8 rounded-3xl shadow-2xl transform transition-all scale-100">
                                        <div className="space-y-4 mb-8">
                                            {Object.entries(currentResult).map(([name, count]) => (
                                                <div key={name} className="flex justify-between items-center border-b border-white/10 pb-3">
                                                    <span className="font-bold-name text-lg">{name}</span>
                                                    <span className="text-2xl font-mono font-bold">{count}</span>
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={saveAllocation} className="w-full bg-white text-black py-4 rounded-xl font-bold hover:bg-gray-100 transition-all flex items-center justify-center gap-2">
                                            <i data-lucide="save" class="w-4 h-4"></i> 確認並儲存至雲端
                                        </button>
                                    </div>
                                ) : (
                                    <div className="border-2 border-dashed border-[#E7E5E4] rounded-3xl h-64 flex flex-col items-center justify-center text-[#A8A29E] bg-white/50">
                                        <i data-lucide="cloud" class="w-8 h-8 mb-3 opacity-20"></i>
                                        <p className="text-sm font-medium">請輸入數量並點擊計算</p>
                                    </div>
                                )}
                            </section>

                            <section>
                                <h2 className="text-[10px] font-mono uppercase tracking-widest text-[#78716C] mb-4 flex items-center gap-2">
                                    <i data-lucide="bar-chart-3" class="w-3 h-3"></i> 04. 當月分配結果
                                </h2>
                                <div className="bg-white p-6 rounded-2xl border border-[#E7E5E4] shadow-sm">
                                    {INITIAL_STAFF.map(s => (
                                        <div key={s.id} className="mb-5 last:mb-0">
                                            <div className="flex justify-between text-xs font-bold mb-1.5 text-[#78716C]">
                                                <span>{s.name}</span>
                                                <span className="font-mono">{monthlyStats[s.name] || 0}</span>
                                            </div>
                                            <div className="h-2 bg-[#F5F5F4] rounded-full overflow-hidden">
                                                <div className={`h-full transition-all duration-1000 ${s.region === 'TW' ? 'bg-black' : 'bg-gray-400'}`} style={{width: `${(monthlyStats[s.name] / (Math.max(...Object.values(monthlyStats)) || 1)) * 100}%`}}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </main>

                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-10 mt-16 border-t border-[#E7E5E4] pt-16">
                        <section>
                            <h2 className="text-[10px] font-mono uppercase tracking-widest text-[#78716C] mb-4 flex items-center gap-2">
                                <i data-lucide="history" class="w-3 h-3"></i> 05. 上次分配紀錄 (雲端同步)
                            </h2>
                            <div className="space-y-3">
                                {history.length > 0 ? history.map(rec => (
                                    <div key={rec.id} className="bg-white p-5 rounded-xl border border-[#E7E5E4] flex justify-between items-center hover:border-black transition-all">
                                        <div>
                                            <p className="text-[10px] font-mono text-[#A8A29E] mb-1">{new Date(rec.date).toLocaleString()}</p>
                                            <p className="font-bold text-lg">{rec.totalUnits} 台已分配</p>
                                        </div>
                                    </div>
                                )) : <div className="text-center py-12 border-2 border-dashed rounded-2xl text-gray-400 italic text-sm">尚無紀錄</div>}
                            </div>
                        </section>

                        <section>
                            <h2 className="text-[10px] font-mono uppercase tracking-widest text-[#78716C] mb-4 flex items-center gap-2">
                                <i data-lucide="trending-up" class="w-3 h-3"></i> 06. 每月數量 ({new Date().getFullYear()})
                            </h2>
                            <div className="bg-white rounded-2xl border border-[#E7E5E4] overflow-hidden shadow-sm">
                                <table className="w-full text-sm">
                                    <thead className="bg-[#FAFAF9] text-[#A8A29E] font-mono text-[10px] border-b border-[#E7E5E4]">
                                        <tr>
                                            <th className="px-6 py-4 text-left font-bold">月份</th>
                                            <th className="px-6 py-4 text-right font-bold">總台數</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-[#F5F5F4]">
                                        {yearlyTable.map((count, i) => (
                                            <tr key={i} className={`hover:bg-gray-50 transition-colors ${new Date().getMonth() === i ? 'bg-gray-50/80 font-bold' : ''}`}>
                                                <td className="px-6 py-4">{i+1}月</td>
                                                <td className="px-6 py-4 text-right font-mono text-base">{count}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </section>
                    </div>

                    {showCalendar && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                                <div className="p-6 border-b flex justify-between items-center bg-[#FAFAF9]">
                                    <h3 className="font-bold flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4"></i> 每日分配明細</h3>
                                    <button onClick={()=>setShowCalendar(false)} className="p-2 hover:bg-gray-200 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                                </div>
                                <div className="p-6">
                                    <div className="grid grid-cols-7 gap-1 mb-2 text-center text-[10px] font-bold text-[#A8A29E] uppercase tracking-tighter">
                                        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d}>{d}</div>)}
                                    </div>
                                    <div className="grid grid-cols-7 gap-1 calendar-grid">
                                        {(() => {
                                            const now = new Date();
                                            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
                                            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                                            const cells = [];
                                            for(let i=0; i<firstDay; i++) cells.push(<div key={`e-${i}`} />);
                                            for(let d=1; d<=daysInMonth; d++) {
                                                const dayTotal = history.filter(r => {
                                                    const rd = new Date(r.date);
                                                    return rd.getDate() === d && rd.getMonth() === now.getMonth() && rd.getFullYear() === now.getFullYear();
                                                }).reduce((a,b)=>a+b.totalUnits, 0);
                                                cells.push(
                                                    <div key={d} className={`border border-[#F5F5F4] p-1 flex flex-col justify-between rounded-sm ${d === now.getDate() ? 'bg-gray-50' : ''}`}>
                                                        <span className="text-[10px] font-mono text-gray-400">{d}</span>
                                                        {dayTotal > 0 && <span className="bg-black text-white text-[9px] font-bold rounded-sm text-center py-0.5 leading-none">{dayTotal}</span>}
                                                    </div>
                                                );
                                            }
                                            return cells;
                                        })()}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    <footer className="mt-24 pb-12 text-center border-t border-[#E7E5E4] pt-10">
                        <p className="text-[10px] font-mono text-[#A8A29E] tracking-[0.3em] uppercase">Furbo Cloud Tool • Build for TW/CN Support Teams</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
